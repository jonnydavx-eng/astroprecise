<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="AstroPrecise logo">
  <defs>
    <linearGradient id="ap-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2DFA7"/>
      <stop offset="0.55" stop-color="#C9A227"/>
      <stop offset="1" stop-color="#8C6A2F"/>
    </linearGradient>
    <linearGradient id="ap-amethyst" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E8C872"/>
      <stop offset="1" stop-color="#8C6A2F"/>
    </linearGradient>
    <radialGradient id="ap-planet" cx="0.35" cy="0.35" r="1">
      <stop offset="0" stop-color="#E8C872"/>
      <stop offset="1" stop-color="#6B4E1A"/>
    </radialGradient>
    <radialGradient id="ap-inner-planet" cx="0.35" cy="0.35" r="1">
      <stop offset="0" stop-color="#F2DFA7"/>
      <stop offset="1" stop-color="#A8841E"/>
    </radialGradient>
  </defs>

  <style>
    /* The chassis (ring, ticks, star, sun) is still; only the sky moves.
       All motion is CSS so it runs when embedded via img tags AND can honour
       the reduced-motion preference below — SMIL could not be switched off. */
    .ap-anim { transform-box: view-box; transform-origin: 0 0; }
    .ap-precess { animation: ap-precess 90s linear infinite; }
    .ap-orbit-a { animation: ap-orbit-a 14s linear infinite; }
    .ap-orbit-b { animation: ap-orbit-b 5.5s linear infinite; }
    .ap-pulse   { opacity: 0; animation: ap-pulse 7s cubic-bezier(0.2, 0.6, 0.4, 1) infinite; }
    .ap-pulse--late { animation-delay: 3.5s; }
    .ap-breathe { animation: ap-breathe 4s ease-in-out infinite; }
    .ap-sun-glow { animation: ap-sun-glow 4s ease-in-out infinite; }

    @keyframes ap-precess { from { transform: translate(32px, 32px) rotate(0turn); }
                            to   { transform: translate(32px, 32px) rotate(1turn); } }
    /* Ellipse travel as translate waypoints (every 30°): the planet stays a
       perfect circle — a rotate inside a squashed frame would shear it. */
    @keyframes ap-orbit-a {
      0%       { transform: translate(27px, 0); }
      8.333%   { transform: translate(23.38px, 4.75px); }
      16.667%  { transform: translate(13.5px, 8.23px); }
      25%      { transform: translate(0, 9.5px); }
      33.333%  { transform: translate(-13.5px, 8.23px); }
      41.667%  { transform: translate(-23.38px, 4.75px); }
      50%      { transform: translate(-27px, 0); }
      58.333%  { transform: translate(-23.38px, -4.75px); }
      66.667%  { transform: translate(-13.5px, -8.23px); }
      75%      { transform: translate(0, -9.5px); }
      83.333%  { transform: translate(13.5px, -8.23px); }
      91.667%  { transform: translate(23.38px, -4.75px); }
      100%     { transform: translate(27px, 0); }
    }
    @keyframes ap-orbit-b { from { transform: translate(32px, 32px) rotate(0turn); }
                            to   { transform: translate(32px, 32px) rotate(1turn); } }
    @keyframes ap-pulse {
      0%   { transform: translate(32px, 32px) scale(0.10); opacity: 0.55; }
      70%  { opacity: 0.14; }
      100% { transform: translate(32px, 32px) scale(1);    opacity: 0; }
    }
    @keyframes ap-breathe  { 0%, 100% { opacity: 0.7;  } 50% { opacity: 0.25; } }
    @keyframes ap-sun-glow { 0%, 100% { opacity: 0.28; } 50% { opacity: 0.10; } }

    @media (prefers-reduced-motion: reduce) {
      .ap-precess, .ap-orbit-a, .ap-orbit-b, .ap-pulse, .ap-breathe, .ap-sun-glow {
        animation: none;
      }
      /* pulses stay invisible; planets rest at their composed positions */
    }
  </style>

  <!-- Hex instrument frame -->
  <path d="M32 3 L57 17.5 L57 46.5 L32 61 L7 46.5 L7 17.5 Z" fill="none" stroke="url(#ap-gold)" stroke-width="1.2" opacity="0.78"/>
  <!-- Celestial ring -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="url(#ap-gold)" stroke-width="1.2" opacity="0.82"/>

  <!-- Precision degree ticks (every 30°, longer at cardinal points) -->
  <g stroke="url(#ap-gold)" stroke-width="1" opacity="0.75">
    <line x1="32" y1="2"  x2="32" y2="6.5"/>
    <line x1="32" y1="62" x2="32" y2="57.5"/>
    <line x1="2"  y1="32" x2="6.5" y2="32"/>
    <line x1="62" y1="32" x2="57.5" y2="32"/>
  </g>
  <g stroke="#C9A227" stroke-width="0.7" opacity="0.45">
    <line x1="47" y1="6.02"  x2="45.5" y2="8.62"/>
    <line x1="57.98" y1="17" x2="55.38" y2="18.5"/>
    <line x1="57.98" y1="47" x2="55.38" y2="45.5"/>
    <line x1="47" y1="57.98" x2="45.5" y2="55.38"/>
    <line x1="17" y1="57.98" x2="18.5" y2="55.38"/>
    <line x1="6.02" y1="47"  x2="8.62" y2="45.5"/>
    <line x1="6.02" y1="17"  x2="8.62" y2="18.5"/>
    <line x1="17" y1="6.02"  x2="18.5" y2="8.62"/>
  </g>

  <!-- Inner dashed meridian -->
  <circle cx="32" cy="32" r="24.5" fill="none" stroke="#C9A227" stroke-width="0.5" opacity="0.3" stroke-dasharray="1.2 3.4"/>

  <!-- Light-cone wavefront — two staggered, eased pulses of birth-light -->
  <g class="ap-anim ap-pulse" aria-hidden="true">
    <circle cx="0" cy="0" r="29" fill="none" stroke="#C9A227" stroke-width="0.8"/>
  </g>
  <g class="ap-anim ap-pulse ap-pulse--late" aria-hidden="true">
    <circle cx="0" cy="0" r="29" fill="none" stroke="#C9A227" stroke-width="0.8"/>
  </g>

  <!-- Outer orbit: the planet truly travels the ellipse (14 s) while the
       whole orbit precesses slowly (90 s) — the 25,772-year wobble, scaled -->
  <g class="ap-anim ap-precess">
    <g transform="rotate(-28)">
      <ellipse cx="0" cy="0" rx="27" ry="9.5" fill="none" stroke="url(#ap-amethyst)" stroke-width="1.1" opacity="0.8"/>
      <!-- attribute transform = resting pose when reduced-motion disables the animation -->
      <g class="ap-anim ap-orbit-a" transform="translate(27 0)">
        <circle cx="0" cy="0" r="4.6" fill="url(#ap-planet)" opacity="0.22"/>
        <circle cx="0" cy="0" r="2.8" fill="url(#ap-planet)"/>
        <circle cx="0" cy="0" r="2.8" fill="none" stroke="#E8C872" stroke-width="0.5" opacity="0.5"/>
      </g>
    </g>
  </g>

  <!-- Inner orbit: small swift body, silver-lapis (5.5 s) -->
  <circle cx="32" cy="32" r="12.5" fill="none" stroke="#C9A227" stroke-width="0.4" opacity="0.22"/>
  <g class="ap-anim ap-orbit-b">
    <g transform="rotate(140) translate(12.5 0)">
      <circle cx="0" cy="0" r="1.7" fill="url(#ap-inner-planet)"/>
    </g>
  </g>

  <!-- Eight-point compass star — the fixed instrument -->
  <path d="M32 12 L34.6 29.4 L52 32 L34.6 34.6 L32 52 L29.4 34.6 L12 32 L29.4 29.4 Z" fill="url(#ap-gold)"/>
  <path d="M32 21 L36.2 27.8 L43 32 L36.2 36.2 L32 43 L27.8 36.2 L21 32 L27.8 27.8 Z"
        fill="url(#ap-gold)" opacity="0.55" transform="rotate(45 32 32)"/>

  <!-- Center jewel — the sun, breathing -->
  <circle class="ap-sun-glow" cx="32" cy="32" r="5.2" fill="#C9A227" opacity="0.28"/>
  <circle cx="32" cy="32" r="2.2" fill="#f0e8d8"/>
  <circle class="ap-breathe" cx="32" cy="32" r="3.4" fill="none" stroke="#C9A227" stroke-width="0.6" opacity="0.7"/>
</svg>
