<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Your Solar Return — the sky of your next birthday, dated and read">
  <defs>
    <radialGradient id="sr-void" cx="34%" cy="26%" r="95%">
      <stop offset="0%" stop-color="#0d0a09"/>
      <stop offset="46%" stop-color="#070509"/>
      <stop offset="100%" stop-color="#040305"/>
    </radialGradient>
    <radialGradient id="sr-sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6dd"/>
      <stop offset="20%" stop-color="#f3dd97"/>
      <stop offset="44%" stop-color="#e6c24a"/>
      <stop offset="72%" stop-color="rgba(201,162,39,0.26)"/>
      <stop offset="100%" stop-color="rgba(201,162,39,0)"/>
    </radialGradient>
    <linearGradient id="sr-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3dd97"/>
      <stop offset="52%" stop-color="#e6c24a"/>
      <stop offset="100%" stop-color="#b8901f"/>
    </linearGradient>
    <linearGradient id="sr-scrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(4,3,5,0)"/>
      <stop offset="68%" stop-color="rgba(4,3,5,0.55)"/>
      <stop offset="100%" stop-color="rgba(4,3,5,0.92)"/>
    </linearGradient>
    <filter id="sr-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
  </defs>

  <!-- void -->
  <rect width="1600" height="900" fill="url(#sr-void)"/>

  <!-- faint starfield (deterministic) -->
  <g fill="#f0e9da">
    <circle cx="150" cy="120" r="1.5" opacity="0.65"/>
    <circle cx="360" cy="70" r="1.1" opacity="0.5"/>
    <circle cx="620" cy="140" r="1.3" opacity="0.55"/>
    <circle cx="900" cy="90" r="1.6" opacity="0.7"/>
    <circle cx="1140" cy="60" r="1.1" opacity="0.5"/>
    <circle cx="1380" cy="130" r="1.7" opacity="0.8"/>
    <circle cx="1500" cy="260" r="1.2" opacity="0.55"/>
    <circle cx="1450" cy="470" r="1.4" opacity="0.6"/>
    <circle cx="1540" cy="600" r="1.1" opacity="0.5"/>
    <circle cx="760" cy="240" r="1" opacity="0.4"/>
    <circle cx="1030" cy="300" r="1.3" opacity="0.55"/>
    <circle cx="240" cy="300" r="1.2" opacity="0.5"/>
    <circle cx="70" cy="470" r="1.5" opacity="0.65"/>
    <circle cx="190" cy="650" r="1.1" opacity="0.5"/>
    <circle cx="1330" cy="620" r="1.3" opacity="0.55"/>
  </g>
  <g fill="#a6aeb8">
    <circle cx="500" cy="280" r="1.1" opacity="0.5"/>
    <circle cx="820" cy="380" r="1" opacity="0.4"/>
    <circle cx="1210" cy="220" r="1.2" opacity="0.5"/>
    <circle cx="120" cy="240" r="1.1" opacity="0.45"/>
    <circle cx="1490" cy="360" r="1.2" opacity="0.5"/>
  </g>

  <!-- rising sun (offset, upper-left) with warm glow -->
  <circle cx="430" cy="300" r="330" fill="url(#sr-sun)"/>
  <circle cx="430" cy="300" r="60" fill="#fff6dd" opacity="0.5" filter="url(#sr-soft)"/>
  <circle cx="430" cy="300" r="34" fill="#fff6dd" filter="url(#sr-soft)"/>

  <!-- left: vertical silver birthday constellation -->
  <g stroke="#a6aeb8" stroke-width="1" fill="none" opacity="0.5">
    <polyline points="150,150 210,300 168,450 232,600 196,760"/>
  </g>
  <g fill="#d8d2cc">
    <circle cx="150" cy="150" r="2.6"/>
    <circle cx="210" cy="300" r="3.4"/>
    <circle cx="168" cy="450" r="2.4"/>
    <circle cx="232" cy="600" r="3"/>
    <circle cx="196" cy="760" r="2.4"/>
  </g>
  <g fill="#b9c4cf" opacity="0.85">
    <circle cx="210" cy="300" r="6.5" opacity="0.18"/>
    <circle cx="232" cy="600" r="6" opacity="0.16"/>
  </g>

  <!-- right: vertical 12-month timeline with highlighted "return" marker -->
  <g transform="translate(1430 0)">
    <!-- faint spine -->
    <line x1="0" y1="120" x2="0" y2="780" stroke="rgba(201,162,39,0.30)" stroke-width="1.4"/>
    <!-- 12 monthly tick marks -->
    <g stroke="#c9a227" stroke-width="1.6" opacity="0.6">
      <line x1="-12" y1="120" x2="12" y2="120"/>
      <line x1="-12" y1="180" x2="12" y2="180"/>
      <line x1="-12" y1="240" x2="12" y2="240"/>
      <line x1="-12" y1="300" x2="12" y2="300"/>
      <line x1="-12" y1="360" x2="12" y2="360"/>
      <line x1="-12" y1="420" x2="12" y2="420"/>
      <line x1="-12" y1="480" x2="12" y2="480"/>
      <line x1="-12" y1="540" x2="12" y2="540"/>
      <line x1="-12" y1="600" x2="12" y2="600"/>
      <line x1="-12" y1="660" x2="12" y2="660"/>
      <line x1="-12" y1="720" x2="12" y2="720"/>
      <line x1="-12" y1="780" x2="12" y2="780"/>
    </g>
    <!-- highlighted "return" marker -->
    <line x1="-20" y1="240" x2="20" y2="240" stroke="url(#sr-gold)" stroke-width="3.4"/>
    <circle cx="0" cy="240" r="9" fill="none" stroke="#e6c24a" stroke-width="2"/>
    <circle cx="0" cy="240" r="3.4" fill="#fff6dd"/>
  </g>

  <!-- bottom scrim for title legibility -->
  <rect y="450" width="1600" height="450" fill="url(#sr-scrim)"/>

  <!-- title block -->
  <g text-anchor="middle" font-family="'Cinzel', 'Cormorant Garamond', Georgia, 'Times New Roman', serif">
    <text x="800" y="648" font-size="32" letter-spacing="13" fill="#e6c24a" opacity="0.85">&#10022; &#160; YOUR BIRTHDAY SKY</text>
    <text x="800" y="760" font-size="122" font-weight="600" fill="url(#sr-gold)" letter-spacing="2">Your Solar Return</text>
    <text x="800" y="818" font-size="40" font-style="italic" fill="#f0e9da" opacity="0.86" font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif">The sky of your next birthday, read</text>
    <text x="800" y="868" font-size="22" letter-spacing="9" fill="#a6aeb8" opacity="0.8">INSTANT PDF &#183; REAL VSOP87</text>
  </g>

  <!-- engraved frame -->
  <rect x="22" y="22" width="1556" height="856" fill="none" stroke="rgba(201,162,39,0.28)" stroke-width="1.5"/>
  <rect x="34" y="34" width="1532" height="832" fill="none" stroke="rgba(201,162,39,0.12)" stroke-width="1"/>
</svg>
