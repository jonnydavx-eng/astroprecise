<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Your Natal Sky — the exact birth-chart wheel of your first breath, as fine-art print">
  <defs>
    <radialGradient id="np-void" cx="50%" cy="38%" r="82%">
      <stop offset="0%" stop-color="#0d0a09"/>
      <stop offset="50%" stop-color="#070509"/>
      <stop offset="100%" stop-color="#040305"/>
    </radialGradient>
    <radialGradient id="np-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6dd"/>
      <stop offset="34%" stop-color="#e6c24a"/>
      <stop offset="70%" stop-color="rgba(201,162,39,0.26)"/>
      <stop offset="100%" stop-color="rgba(201,162,39,0)"/>
    </radialGradient>
    <linearGradient id="np-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3dd97"/>
      <stop offset="52%" stop-color="#e6c24a"/>
      <stop offset="100%" stop-color="#b8901f"/>
    </linearGradient>
    <linearGradient id="np-silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8d2cc"/>
      <stop offset="55%" stop-color="#b9c4cf"/>
      <stop offset="100%" stop-color="#a6aeb8"/>
    </linearGradient>
    <linearGradient id="np-scrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(4,3,5,0)"/>
      <stop offset="68%" stop-color="rgba(4,3,5,0.52)"/>
      <stop offset="100%" stop-color="rgba(4,3,5,0.92)"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#np-void)"/>

  <!-- faint deterministic starfield -->
  <g fill="#f0e9da">
    <circle cx="130" cy="100" r="1.5" opacity="0.6"/>
    <circle cx="350" cy="70" r="1.1" opacity="0.5"/>
    <circle cx="560" cy="120" r="1.3" opacity="0.55"/>
    <circle cx="1060" cy="90" r="1.4" opacity="0.6"/>
    <circle cx="1280" cy="70" r="1.6" opacity="0.7"/>
    <circle cx="1470" cy="150" r="1.2" opacity="0.55"/>
    <circle cx="1530" cy="340" r="1.5" opacity="0.65"/>
    <circle cx="120" cy="300" r="1.3" opacity="0.55"/>
    <circle cx="80" cy="480" r="1.5" opacity="0.6"/>
    <circle cx="1500" cy="500" r="1.2" opacity="0.5"/>
    <circle cx="1410" cy="250" r="1.1" opacity="0.45"/>
    <circle cx="240" cy="430" r="1.2" opacity="0.5"/>
  </g>
  <g fill="#a6aeb8">
    <circle cx="450" cy="200" r="1.1" opacity="0.5"/>
    <circle cx="980" cy="180" r="1" opacity="0.45"/>
    <circle cx="1180" cy="220" r="1.2" opacity="0.5"/>
    <circle cx="190" cy="200" r="1" opacity="0.45"/>
    <circle cx="1350" cy="420" r="1.1" opacity="0.5"/>
  </g>

  <!-- natal wheel mandala -->
  <g transform="translate(800 410)">
    <!-- outer silver zodiac ring -->
    <circle r="306" fill="none" stroke="url(#np-silver)" stroke-width="2" opacity="0.85"/>
    <circle r="288" fill="none" stroke="rgba(166,174,184,0.35)" stroke-width="1"/>
    <!-- inner ring -->
    <circle r="210" fill="none" stroke="rgba(201,162,39,0.30)" stroke-width="1.4"/>
    <circle r="150" fill="none" stroke="rgba(201,162,39,0.16)" stroke-width="1" stroke-dasharray="3 7"/>

    <!-- 12 zodiac division spokes (thin gold ticks) -->
    <g stroke="#c9a227" stroke-width="1.2" opacity="0.5">
      <line x1="0" y1="-306" x2="0" y2="-210"/>
      <line transform="rotate(30)"  x1="0" y1="-306" x2="0" y2="-210"/>
      <line transform="rotate(60)"  x1="0" y1="-306" x2="0" y2="-210"/>
      <line transform="rotate(90)"  x1="0" y1="-306" x2="0" y2="-210"/>
      <line transform="rotate(120)" x1="0" y1="-306" x2="0" y2="-210"/>
      <line transform="rotate(150)" x1="0" y1="-306" x2="0" y2="-210"/>
      <line transform="rotate(180)" x1="0" y1="-306" x2="0" y2="-210"/>
      <line transform="rotate(210)" x1="0" y1="-306" x2="0" y2="-210"/>
      <line transform="rotate(240)" x1="0" y1="-306" x2="0" y2="-210"/>
      <line transform="rotate(270)" x1="0" y1="-306" x2="0" y2="-210"/>
      <line transform="rotate(300)" x1="0" y1="-306" x2="0" y2="-210"/>
      <line transform="rotate(330)" x1="0" y1="-306" x2="0" y2="-210"/>
    </g>

    <!-- aspect connector lines (planet nodes on r=250) -->
    <g stroke="#c9a227" stroke-width="1" fill="none" opacity="0.40">
      <!-- Sun(15°) -> Saturn(205°) -->
      <line x1="64.7" y1="-241.5" x2="-105.7" y2="226.5"/>
      <!-- Moon(70°) -> Jupiter(255°) -->
      <line x1="234.9" y1="-85.5" x2="-64.7" y2="241.5"/>
      <!-- Mercury(130°) -> Venus(315°) -->
      <line x1="191.5" y1="160.7" x2="-176.8" y2="-176.8"/>
      <!-- Mars(180°) -> Saturn(205°) (faint trine) -->
      <line x1="0" y1="250" x2="-105.7" y2="226.5"/>
    </g>

    <!-- planet nodes (geometric gold), positioned on mid-radius r=250 -->
    <g>
      <!-- Sun 15° -->
      <circle cx="64.7" cy="-241.5" r="9" fill="#e6c24a" stroke="#f3dd97" stroke-width="1"/>
      <!-- Moon 70° -->
      <circle cx="234.9" cy="-85.5" r="7" fill="#d8d2cc" stroke="#b9c4cf" stroke-width="1"/>
      <!-- Mercury 130° -->
      <circle cx="191.5" cy="160.7" r="6" fill="#caa46a"/>
      <!-- Mars 180° -->
      <circle cx="0" cy="250" r="7" fill="#e6c24a"/>
      <!-- Saturn 205° -->
      <circle cx="-105.7" cy="226.5" r="6.5" fill="#b8901f" stroke="#c9a227" stroke-width="1"/>
      <!-- Jupiter 255° -->
      <circle cx="-64.7" cy="241.5" r="8" fill="#f3dd97"/>
      <!-- Venus 315° -->
      <circle cx="-176.8" cy="-176.8" r="6.5" fill="#caa46a"/>
    </g>

    <!-- soft central glow -->
    <circle r="120" fill="url(#np-core)"/>

    <!-- engraved compass-rose / 4-point star at center -->
    <g opacity="0.95">
      <polygon points="0,-60 11,-11 60,0 11,11 0,60 -11,11 -60,0 -11,-11" fill="url(#np-gold)"/>
      <polygon points="0,-34 24,-24 34,0 24,24 0,34 -24,24 -34,0 -24,-24" fill="none" stroke="#f3dd97" stroke-width="1" opacity="0.6"/>
      <circle r="5" fill="#fff6dd"/>
    </g>
  </g>

  <!-- scrim + title -->
  <rect y="470" width="1600" height="430" fill="url(#np-scrim)"/>
  <g text-anchor="middle" font-family="'Cinzel','Cormorant Garamond',Georgia,'Times New Roman',serif">
    <text x="800" y="648" font-size="32" letter-spacing="13" fill="#e6c24a" opacity="0.85" font-family="'Cinzel',Georgia,serif">&#10022; &#160; FINE-ART PRINT</text>
    <text x="800" y="758" font-size="122" font-weight="600" fill="url(#np-gold)" letter-spacing="2">Your Natal Sky</text>
    <text x="800" y="816" font-size="40" font-style="italic" fill="#f0e9da" opacity="0.86">The exact wheel of your first breath</text>
    <text x="800" y="866" font-size="21" letter-spacing="8" fill="#a6aeb8" opacity="0.8" font-family="'Cinzel',Georgia,serif">REAL VSOP87 &#183; 250GSM MUSEUM MATTE</text>
  </g>

  <!-- engraved double frame -->
  <rect x="22" y="22" width="1556" height="856" fill="none" stroke="rgba(201,162,39,0.28)" stroke-width="1.5"/>
  <rect x="34" y="34" width="1532" height="832" fill="none" stroke="rgba(201,162,39,0.12)" stroke-width="1"/>
</svg>
