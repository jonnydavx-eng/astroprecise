<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Your Cosmic Story — a personalised narrative read from your real birth chart">
  <defs>
    <radialGradient id="cs-void" cx="42%" cy="38%" r="85%">
      <stop offset="0%" stop-color="#0d0a09"/>
      <stop offset="48%" stop-color="#070509"/>
      <stop offset="100%" stop-color="#040305"/>
    </radialGradient>
    <radialGradient id="cs-sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6dd"/>
      <stop offset="22%" stop-color="#f2d27a"/>
      <stop offset="48%" stop-color="#c9a227"/>
      <stop offset="78%" stop-color="rgba(201,162,39,0.28)"/>
      <stop offset="100%" stop-color="rgba(201,162,39,0)"/>
    </radialGradient>
    <linearGradient id="cs-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3dd97"/>
      <stop offset="52%" stop-color="#e6c24a"/>
      <stop offset="100%" stop-color="#b8901f"/>
    </linearGradient>
    <linearGradient id="cs-scrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(4,3,5,0)"/>
      <stop offset="70%" stop-color="rgba(4,3,5,0.55)"/>
      <stop offset="100%" stop-color="rgba(4,3,5,0.9)"/>
    </linearGradient>
    <filter id="cs-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <!-- void -->
  <rect width="1600" height="900" fill="url(#cs-void)"/>

  <!-- starfield (deterministic) -->
  <g fill="#f0e9da">
    <circle cx="120" cy="90" r="1.6" opacity="0.7"/>
    <circle cx="300" cy="150" r="1.1" opacity="0.5"/>
    <circle cx="520" cy="70" r="1.8" opacity="0.85"/>
    <circle cx="760" cy="120" r="1.2" opacity="0.55"/>
    <circle cx="980" cy="60" r="1.5" opacity="0.7"/>
    <circle cx="1180" cy="110" r="1.1" opacity="0.5"/>
    <circle cx="1360" cy="80" r="2" opacity="0.9"/>
    <circle cx="1470" cy="180" r="1.3" opacity="0.6"/>
    <circle cx="1530" cy="320" r="1.6" opacity="0.7"/>
    <circle cx="1420" cy="430" r="1.1" opacity="0.5"/>
    <circle cx="1290" cy="250" r="1.4" opacity="0.6"/>
    <circle cx="1110" cy="330" r="1.1" opacity="0.45"/>
    <circle cx="1230" cy="520" r="1.5" opacity="0.65"/>
    <circle cx="1490" cy="560" r="1.2" opacity="0.55"/>
    <circle cx="170" cy="320" r="1.3" opacity="0.6"/>
    <circle cx="90" cy="500" r="1.6" opacity="0.7"/>
    <circle cx="250" cy="620" r="1.1" opacity="0.5"/>
    <circle cx="60" cy="700" r="1.4" opacity="0.6"/>
    <circle cx="380" cy="460" r="1" opacity="0.4"/>
    <circle cx="1380" cy="640" r="1.3" opacity="0.55"/>
  </g>
  <g fill="#a6aeb8">
    <circle cx="430" cy="240" r="1.2" opacity="0.55"/>
    <circle cx="880" cy="220" r="1" opacity="0.45"/>
    <circle cx="1050" cy="170" r="1.3" opacity="0.5"/>
    <circle cx="1320" cy="360" r="1.1" opacity="0.5"/>
    <circle cx="200" cy="430" r="1.2" opacity="0.5"/>
    <circle cx="700" cy="300" r="1" opacity="0.4"/>
  </g>

  <!-- constellation line (upper right) -->
  <g stroke="#c9a227" stroke-width="1" fill="none" opacity="0.42">
    <polyline points="980,60 1110,160 1180,110 1290,250 1230,360"/>
  </g>
  <g fill="#f3dd97">
    <circle cx="980" cy="60" r="2.4"/>
    <circle cx="1110" cy="160" r="2.4"/>
    <circle cx="1180" cy="110" r="2.4"/>
    <circle cx="1290" cy="250" r="2.4"/>
    <circle cx="1230" cy="360" r="2.4"/>
  </g>

  <!-- ecliptic ring -->
  <g transform="translate(560 380) rotate(-13)">
    <ellipse rx="640" ry="250" fill="none" stroke="#c9a227" stroke-width="1.4" stroke-dasharray="3 9" opacity="0.5"/>
    <ellipse rx="640" ry="250" fill="none" stroke="rgba(201,162,39,0.10)" stroke-width="22"/>
    <!-- planets riding the ring -->
    <circle cx="-512" cy="-72" r="6" fill="#d8d2cc"/>
    <circle cx="392" cy="158" r="9" fill="#e6c24a"/>
    <circle cx="-188" cy="206" r="5" fill="#b9c4cf"/>
    <circle cx="600" cy="-30" r="7" fill="#caa46a"/>
  </g>

  <!-- radiant sun -->
  <circle cx="560" cy="380" r="270" fill="url(#cs-sun)"/>
  <circle cx="560" cy="380" r="30" fill="#fff6dd" filter="url(#cs-soft)"/>

  <!-- bottom scrim for title legibility -->
  <rect y="430" width="1600" height="470" fill="url(#cs-scrim)"/>

  <!-- title block -->
  <g text-anchor="middle" font-family="'Cormorant Garamond', 'Cinzel', Georgia, 'Times New Roman', serif">
    <text x="800" y="640" font-size="34" letter-spacing="14" fill="#e6c24a" opacity="0.85" font-family="'Cinzel', Georgia, serif">&#10022; &#160; A PERSONALISED READING</text>
    <text x="800" y="752" font-size="122" font-weight="600" fill="url(#cs-gold)" letter-spacing="2">Your Cosmic Story</text>
    <text x="800" y="812" font-size="40" font-style="italic" fill="#f0e9da" opacity="0.86">Written from the exact sky of your first breath</text>
    <text x="800" y="864" font-size="22" letter-spacing="9" fill="#a6aeb8" opacity="0.8" font-family="'Cinzel', Georgia, serif">REAL VSOP87 &#183; YOURS ALONE &#183; KEEPSAKE PDF</text>
  </g>

  <!-- engraved frame -->
  <rect x="22" y="22" width="1556" height="856" fill="none" stroke="rgba(201,162,39,0.28)" stroke-width="1.5"/>
  <rect x="34" y="34" width="1532" height="832" fill="none" stroke="rgba(201,162,39,0.12)" stroke-width="1"/>
</svg>
