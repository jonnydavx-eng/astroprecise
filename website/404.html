<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lost in the void | AstroPrecise</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="css/fonts.css" />
<link rel="icon" type="image/svg+xml" href="img/favicon.svg" />
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;
      background:radial-gradient(ellipse 120% 90% at 50% 30%,#0D0A07 0%,#050406 60%,#030203 100%);color:#E8E0D0;
      font-family:'Cormorant Garamond',serif;padding:24px;}
    .wrap{max-width:480px;}
    .glyph{font-size:3.4rem;color:#C9A227;text-shadow:0 0 40px rgba(201,162,39,.4);font-family:serif;}
    h1{font-family:'Cinzel',serif;font-weight:600;letter-spacing:.18em;font-size:1.4rem;color:#EFE3C0;margin:18px 0 10px;}
    p{font-size:1.12rem;line-height:1.8;color:#A89E88;font-style:italic;margin:0 0 28px;}
    a{display:inline-block;font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:.2em;text-transform:uppercase;
      color:#C9A227;text-decoration:none;border:1px solid rgba(201,162,39,.4);padding:13px 30px;border-radius:30px;transition:all .3s;}
    a:hover{background:rgba(201,162,39,.1);box-shadow:0 0 30px rgba(201,162,39,.2);}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="glyph">☄</div>
    <h1>404 · OFF THE ECLIPTIC</h1>
    <p>This page has precessed beyond the visible sky — or never rose at all.
       The instrument, however, is exactly where you left it.</p>
    <a href="./">✦ &nbsp;Return to the sky</a>
  </div>
</body>
</html>
