<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AstroPrecise — phone audit</title>
  <script src="https://cdn.jsdelivr.net/npm/axe-core@4.10.3/axe.min.js"></script>
  <style>
    :root { --bg:#06060f; --panel:#12121f; --line:#2a2840; --ink:#e8e4f0; --muted:#9a94b0; --accent:#c9a227; --ok:#3fb950; --warn:#d29922; --bad:#f85149; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; background:var(--bg); color:var(--ink); font:15px/1.5 system-ui,Segoe UI,sans-serif; }
    .wrap { max-width:520px; margin:0 auto; padding:18px 16px 40px; }
    h1 { margin:0 0 6px; font-size:20px; }
    .sub { color:var(--muted); font-size:13px; margin-bottom:16px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:12px; }
    button { width:100%; border:0; border-radius:10px; padding:14px 16px; font:inherit; font-weight:600; cursor:pointer; background:var(--accent); color:#1a1204; }
    button:disabled { opacity:.45; cursor:wait; }
    .status { font-size:13px; color:var(--muted); margin-top:10px; min-height:1.4em; }
    .bar { height:8px; background:#1c1a2e; border-radius:99px; overflow:hidden; margin-top:10px; }
    .bar > i { display:block; height:100%; width:0; background:linear-gradient(90deg,#6b4f12,var(--accent)); transition:width .25s; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th, td { text-align:left; padding:6px 4px; border-bottom:1px solid var(--line); vertical-align:top; }
    th { color:var(--muted); font-weight:600; }
    .tag { display:inline-block; border-radius:99px; padding:2px 8px; font-size:11px; font-weight:700; }
    .tag.ok { background:rgba(63,185,80,.15); color:var(--ok); }
    .tag.warn { background:rgba(210,153,34,.15); color:var(--warn); }
    .tag.bad { background:rgba(248,81,73,.15); color:var(--bad); }
    #probe { position:fixed; inset:0; width:100%; height:100%; border:0; z-index:50; background:var(--bg); }
    #probe[hidden] { display:none; }
    .hidden { display:none !important; }
    pre { white-space:pre-wrap; word-break:break-word; font:11px/1.4 ui-monospace,Consolas,monospace; color:var(--muted); max-height:180px; overflow:auto; }
    .skip-link { position:absolute; left:-9999px; top:0; z-index:100; padding:10px 16px; background:var(--accent);
      color:#1a1204; font-size:14px; text-decoration:none; border-radius:4px; }
    .skip-link:focus { left:12px; top:12px; }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <main id="main">
    <iframe id="probe" hidden title="Audit page probe (hidden)"></iframe>
    <div class="wrap">
    <h1>Phone audit</h1>
    <p class="sub">Runs on <strong>this device</strong> — no headless Chrome on the PC. Real WebGL, real touch, real RAM.</p>
    <div class="card" id="dnsTip" style="border-color:#6b4f12;font-size:13px;color:#d4c4a0">
      <strong>Tailscale DNS broken?</strong> Use raw IPs (no DNS):<br>
      LAN <a href="http://192.168.30.97:8790/phone-audit.html" style="color:#c9a227">192.168.30.97:8790</a> ·
      Tailscale <a href="http://100.125.139.73:8790/phone-audit.html" style="color:#c9a227">100.125.139.73:8790</a>
    </div>
    <div class="card">
      <div>Target: <code id="baseLabel"></code></div>
      <div>Collector: <code id="collectorLabel"></code></div>
      <button id="runBtn" type="button">Run full audit (5 pages)</button>
      <div class="bar"><i id="prog"></i></div>
      <div class="status" id="status">Ready.</div>
    </div>
    <div class="card hidden" id="resultsCard">
      <table id="scores"></table>
      <pre id="raw"></pre>
    </div>
    </div>
  </main>
  <script>
    const PAGES = [
      { id: 'index', path: '/' },
      { id: 'chart', path: '/chart.html' },
      { id: 'horoscope', path: '/horoscope.html' },
      { id: 'compatibility', path: '/compatibility.html' },
      { id: 'ephemeris', path: '/ephemeris.html' },
    ];
    const HOSTS = { lan: '192.168.30.97', ts: '100.125.139.73' };
    const params = new URLSearchParams(location.search);
    const hostIp = /^(\d{1,3}\.){3}\d{1,3}$/.test(location.hostname)
      ? location.hostname
      : (params.get('host') || HOSTS.lan);
    const BASE = (params.get('base') || `http://${hostIp}:8790`).replace(/\/$/, '');
    const COLLECTOR = (params.get('collector') || `http://${hostIp}:8791`).replace(/\/$/, '');

    const $ = (id) => document.getElementById(id);
    $('baseLabel').textContent = BASE;
    $('collectorLabel').textContent = COLLECTOR;

    function setStatus(msg, pct) {
      $('status').textContent = msg;
      if (typeof pct === 'number') $('prog').style.width = `${pct}%`;
    }

    function gradeA11y(violations) {
      const crit = violations.filter((v) => v.impact === 'critical' || v.impact === 'serious').length;
      if (crit) return { label: `${crit} serious`, cls: 'bad' };
      if (violations.length) return { label: `${violations.length} minor`, cls: 'warn' };
      return { label: 'clean', cls: 'ok' };
    }

    function gradePerf(m) {
      const issues = [];
      if (m.fcp && m.fcp > 3000) issues.push('FCP');
      if (m.lcp && m.lcp > 4000) issues.push('LCP');
      if (m.loadMs && m.loadMs > 8000) issues.push('load');
      if (!issues.length) return { label: 'ok', cls: 'ok' };
      return { label: issues.join('+'), cls: issues.includes('LCP') || issues.includes('load') ? 'bad' : 'warn' };
    }

    function loadInProbe(path, waitMs) {
      return new Promise((resolve, reject) => {
        const iframe = $('probe');
        iframe.hidden = false;
        const done = () => {
          iframe.removeEventListener('load', onLoad);
          clearTimeout(timer);
        };
        const onLoad = async () => {
          try {
            const win = iframe.contentWindow;
            const doc = iframe.contentDocument;
            if (!win || !doc) throw new Error('probe not same-origin');
            try {
              win.sessionStorage.setItem('ap_intro_complete', '1');
              win.localStorage.setItem('ap_privacy_ack', '1');
            } catch (_) {}
            await new Promise((r) => setTimeout(r, waitMs));
            resolve({ win, doc });
          } catch (e) {
            reject(e);
          } finally {
            done();
          }
        };
        const timer = setTimeout(() => { done(); reject(new Error(`timeout ${path}`)); }, 60000);
        iframe.addEventListener('load', onLoad);
        iframe.src = `${BASE}${path}${path.includes('?') ? '&' : '?'}ap_phone_audit=1&v=${Date.now()}`;
      });
    }

    async function auditOne(page, idx, total) {
      setStatus(`Auditing ${page.id}…`, Math.round((idx / total) * 100));
      const waitMs = page.id === 'index' ? 5000 : page.id === 'ephemeris' ? 4000 : 2500;
      const t0 = performance.now();
      const { win, doc } = await loadInProbe(page.path, waitMs);
      const loadMs = Math.round(performance.now() - t0);
      const nav = win.performance.getEntriesByType('navigation')[0];
      const paints = win.performance.getEntriesByType('paint');
      const fcp = paints.find((x) => x.name === 'first-contentful-paint');
      let lcp = null;
      try {
        const lcpEntries = win.performance.getEntriesByType('largest-contentful-paint');
        if (lcpEntries.length) lcp = Math.round(lcpEntries[lcpEntries.length - 1].startTime);
      } catch (_) {}
      const axeResults = await axe.run(doc, { runOnly: { type: 'tag', values: ['wcag2a', 'wcag2aa', 'best-practice'] } });
      return {
        id: page.id,
        path: page.path,
        loadMs,
        metrics: {
          domContentLoaded: nav ? Math.round(nav.domContentLoadedEventEnd) : null,
          loadEvent: nav ? Math.round(nav.loadEventEnd) : null,
          fcp: fcp ? Math.round(fcp.startTime) : null,
          lcp,
          transferSize: nav ? nav.transferSize : null,
        },
        a11y: {
          violations: axeResults.violations.map((v) => ({
            id: v.id,
            impact: v.impact,
            description: v.description,
            nodes: v.nodes.length,
          })),
          passes: axeResults.passes.length,
          incomplete: axeResults.incomplete.length,
        },
        device: {
          ua: navigator.userAgent,
          dpr: window.devicePixelRatio,
          viewport: `${window.innerWidth}x${window.innerHeight}`,
        },
      };
    }

    async function postReport(report) {
      try {
        const res = await fetch(`${COLLECTOR}/report`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(report),
        });
        return res.ok;
      } catch (e) {
        console.warn('collector POST failed', e);
        return false;
      }
    }

    function renderResults(report) {
      $('resultsCard').classList.remove('hidden');
      const rows = [['Page', 'Perf', 'A11y', 'FCP', 'LCP', 'Load']];
      for (const p of report.pages) {
        const perf = gradePerf({ ...p.metrics, loadMs: p.loadMs });
        const a11y = gradeA11y(p.a11y?.violations || []);
        rows.push([
          p.id,
          `<span class="tag ${perf.cls}">${perf.label}</span>`,
          `<span class="tag ${a11y.cls}">${a11y.label}</span>`,
          p.metrics.fcp ? `${p.metrics.fcp}ms` : '—',
          p.metrics.lcp ? `${p.metrics.lcp}ms` : '—',
          `${p.loadMs}ms`,
        ]);
      }
      $('scores').innerHTML = rows.map((r, i) => {
        const cells = r.map((c) => `<${i ? 'td' : 'th'}>${c}</${i ? 'td' : 'th'}>`).join('');
        return `<tr>${cells}</tr>`;
      }).join('');
      $('raw').textContent = JSON.stringify(report, null, 2);
    }

    $('runBtn').addEventListener('click', async () => {
      $('runBtn').disabled = true;
      $('probe').hidden = false;
      const report = {
        base: BASE,
        collector: COLLECTOR,
        capturedAt: new Date().toISOString(),
        source: 'phone-audit',
        pages: [],
        issues: [],
      };
      try {
        for (let i = 0; i < PAGES.length; i++) {
          try {
            const entry = await auditOne(PAGES[i], i, PAGES.length);
            report.pages.push(entry);
            for (const v of entry.a11y.violations) {
              if (v.impact === 'critical' || v.impact === 'serious') {
                report.issues.push(`${entry.id}: ${v.id} (${v.impact})`);
              }
            }
            if (entry.metrics.fcp && entry.metrics.fcp > 3000) report.issues.push(`${entry.id}: FCP ${entry.metrics.fcp}ms`);
            if (entry.metrics.lcp && entry.metrics.lcp > 4000) report.issues.push(`${entry.id}: LCP ${entry.metrics.lcp}ms`);
          } catch (err) {
            report.pages.push({ id: PAGES[i].id, path: PAGES[i].path, error: String(err) });
            report.issues.push(`${PAGES[i].id}: ${err.message || err}`);
          }
        }
        report.ok = report.issues.length === 0;
        renderResults(report);
        const posted = await postReport(report);
        setStatus(posted ? 'Done — sent to PC collector.' : 'Done — collector unreachable (JSON below).', 100);
      } catch (err) {
        setStatus(`Failed: ${err.message || err}`, 0);
      } finally {
        $('probe').hidden = true;
        $('runBtn').disabled = false;
      }
    });
  </script>
</body>
</html>
