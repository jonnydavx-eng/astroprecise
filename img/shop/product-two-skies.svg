<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Two Skies — two birth charts drawn together as one map, fine-art print">
  <defs>
    <radialGradient id="ts-void" cx="50%" cy="38%" r="82%">
      <stop offset="0%" stop-color="#0d0a09"/>
      <stop offset="50%" stop-color="#070509"/>
      <stop offset="100%" stop-color="#040305"/>
    </radialGradient>
    <radialGradient id="ts-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6dd"/>
      <stop offset="30%" stop-color="rgba(230,194,74,0.55)"/>
      <stop offset="64%" stop-color="rgba(201,162,39,0.20)"/>
      <stop offset="100%" stop-color="rgba(201,162,39,0)"/>
    </radialGradient>
    <linearGradient id="ts-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3dd97"/>
      <stop offset="52%" stop-color="#e6c24a"/>
      <stop offset="100%" stop-color="#b8901f"/>
    </linearGradient>
    <linearGradient id="ts-scrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(4,3,5,0)"/>
      <stop offset="68%" stop-color="rgba(4,3,5,0.52)"/>
      <stop offset="100%" stop-color="rgba(4,3,5,0.92)"/>
    </linearGradient>
    <filter id="ts-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- void -->
  <rect width="1600" height="900" fill="url(#ts-void)"/>

  <!-- faint starfield (deterministic) -->
  <g fill="#f0e9da">
    <circle cx="130" cy="100" r="1.5" opacity="0.65"/>
    <circle cx="340" cy="70" r="1.1" opacity="0.5"/>
    <circle cx="560" cy="120" r="1.6" opacity="0.7"/>
    <circle cx="1060" cy="90" r="1.4" opacity="0.6"/>
    <circle cx="1270" cy="120" r="1.2" opacity="0.55"/>
    <circle cx="1470" cy="180" r="1.7" opacity="0.75"/>
    <circle cx="1520" cy="360" r="1.3" opacity="0.6"/>
    <circle cx="100" cy="280" r="1.2" opacity="0.5"/>
    <circle cx="80" cy="470" r="1.5" opacity="0.65"/>
    <circle cx="1430" cy="470" r="1.2" opacity="0.55"/>
    <circle cx="1540" cy="540" r="1.1" opacity="0.45"/>
    <circle cx="210" cy="520" r="1.3" opacity="0.55"/>
  </g>
  <g fill="#a6aeb8">
    <circle cx="450" cy="220" r="1.1" opacity="0.5"/>
    <circle cx="1180" cy="240" r="1.2" opacity="0.5"/>
    <circle cx="900" cy="80" r="1" opacity="0.42"/>
    <circle cx="1340" cy="330" r="1.1" opacity="0.48"/>
    <circle cx="170" cy="380" r="1.2" opacity="0.5"/>
  </g>

  <!-- shared sky glow over the overlap -->
  <ellipse cx="800" cy="400" rx="190" ry="300" fill="url(#ts-glow)" opacity="0.85"/>

  <!-- synastry aspect lines crossing the shared overlap (gold node -> silver node) -->
  <g stroke="#f3dd97" stroke-width="1" fill="none" opacity="0.34">
    <line x1="932" y1="252" x2="668" y2="548"/>
    <line x1="940" y1="480" x2="660" y2="320"/>
    <line x1="900" y1="160" x2="700" y2="640"/>
    <line x1="966" y1="400" x2="634" y2="400"/>
    <line x1="876" y1="608" x2="724" y2="192"/>
  </g>

  <!-- WHEEL ONE (gold) — left -->
  <g transform="translate(660 400)">
    <circle r="240" fill="none" stroke="rgba(201,162,39,0.32)" stroke-width="1.6"/>
    <circle r="200" fill="none" stroke="rgba(201,162,39,0.16)" stroke-width="1"/>
    <g stroke="#c9a227" stroke-width="1.3" opacity="0.5">
      <line x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(30)"  x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(60)"  x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(90)"  x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(120)" x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(150)" x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(180)" x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(210)" x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(240)" x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(270)" x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(300)" x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(330)" x1="0" y1="-240" x2="0" y2="-200"/>
    </g>
    <circle r="92" fill="none" stroke="rgba(201,162,39,0.18)" stroke-width="0.8" stroke-dasharray="3 7"/>
    <!-- planet nodes (gold) -->
    <circle cx="40" cy="-208" r="7" fill="#e6c24a"/>
    <circle cx="-186" cy="-92" r="5.5" fill="#f3dd97"/>
    <circle cx="-148" cy="148" r="5" fill="#caa46a"/>
    <circle cx="206" cy="80" r="6" fill="#e6c24a"/>
  </g>

  <!-- WHEEL TWO (silver) — right -->
  <g transform="translate(940 400)">
    <circle r="240" fill="none" stroke="rgba(166,174,184,0.32)" stroke-width="1.6"/>
    <circle r="200" fill="none" stroke="rgba(166,174,184,0.16)" stroke-width="1"/>
    <g stroke="#a6aeb8" stroke-width="1.3" opacity="0.5">
      <line x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(30)"  x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(60)"  x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(90)"  x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(120)" x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(150)" x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(180)" x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(210)" x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(240)" x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(270)" x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(300)" x1="0" y1="-240" x2="0" y2="-200"/>
      <line transform="rotate(330)" x1="0" y1="-240" x2="0" y2="-200"/>
    </g>
    <circle r="92" fill="none" stroke="rgba(166,174,184,0.18)" stroke-width="0.8" stroke-dasharray="3 7"/>
    <!-- planet nodes (silver) -->
    <circle cx="-40" cy="-208" r="7" fill="#b9c4cf"/>
    <circle cx="186" cy="-92" r="5.5" fill="#d8d2cc"/>
    <circle cx="148" cy="148" r="5" fill="#a6aeb8"/>
    <circle cx="-206" cy="80" r="6" fill="#b9c4cf"/>
  </g>

  <!-- shared-sky bright core where the two wheels meet -->
  <circle cx="800" cy="400" r="12" fill="#fff6dd" filter="url(#ts-soft)"/>

  <!-- scrim for title legibility -->
  <rect y="470" width="1600" height="430" fill="url(#ts-scrim)"/>

  <!-- title block -->
  <g text-anchor="middle" font-family="'Cinzel', 'Cormorant Garamond', Georgia, 'Times New Roman', serif">
    <text x="800" y="648" font-size="32" letter-spacing="13" fill="#e6c24a" opacity="0.85" font-family="'Cinzel', Georgia, serif">&#10022; &#160; TWO CHARTS, ONE SKY</text>
    <text x="800" y="758" font-size="120" font-weight="600" fill="url(#ts-gold)" letter-spacing="2">Two Skies</text>
    <text x="800" y="816" font-size="38" font-style="italic" fill="#f0e9da" opacity="0.86">Your charts, drawn together</text>
    <text x="800" y="866" font-size="21" letter-spacing="8" fill="#a6aeb8" opacity="0.8" font-family="'Cinzel', Georgia, serif">REAL VSOP87 &#183; 250GSM MUSEUM MATTE</text>
  </g>

  <!-- engraved frame -->
  <rect x="22" y="22" width="1556" height="856" fill="none" stroke="rgba(201,162,39,0.28)" stroke-width="1.5"/>
  <rect x="34" y="34" width="1532" height="832" fill="none" stroke="rgba(201,162,39,0.12)" stroke-width="1"/>
</svg>
