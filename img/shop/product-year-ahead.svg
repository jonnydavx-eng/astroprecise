<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Your Year Ahead — twelve months of transits to your chart, dated and interpreted">
  <defs>
    <radialGradient id="ya-void" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0d0a09"/>
      <stop offset="50%" stop-color="#070509"/>
      <stop offset="100%" stop-color="#040305"/>
    </radialGradient>
    <radialGradient id="ya-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6dd"/>
      <stop offset="35%" stop-color="#e6c24a"/>
      <stop offset="70%" stop-color="rgba(201,162,39,0.30)"/>
      <stop offset="100%" stop-color="rgba(201,162,39,0)"/>
    </radialGradient>
    <linearGradient id="ya-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3dd97"/>
      <stop offset="52%" stop-color="#e6c24a"/>
      <stop offset="100%" stop-color="#b8901f"/>
    </linearGradient>
    <linearGradient id="ya-scrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(4,3,5,0)"/>
      <stop offset="68%" stop-color="rgba(4,3,5,0.5)"/>
      <stop offset="100%" stop-color="rgba(4,3,5,0.92)"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#ya-void)"/>

  <!-- faint starfield -->
  <g fill="#f0e9da">
    <circle cx="140" cy="120" r="1.4" opacity="0.6"/>
    <circle cx="380" cy="80" r="1.1" opacity="0.5"/>
    <circle cx="1240" cy="100" r="1.5" opacity="0.65"/>
    <circle cx="1460" cy="200" r="1.2" opacity="0.55"/>
    <circle cx="1520" cy="430" r="1.4" opacity="0.6"/>
    <circle cx="120" cy="430" r="1.3" opacity="0.55"/>
    <circle cx="90" cy="250" r="1.1" opacity="0.45"/>
    <circle cx="1380" cy="330" r="1.2" opacity="0.5"/>
  </g>

  <!-- the year as a 12-month ecliptic ring -->
  <g transform="translate(800 420)">
    <!-- outer + inner ring -->
    <circle r="300" fill="none" stroke="rgba(201,162,39,0.30)" stroke-width="1.6"/>
    <circle r="252" fill="none" stroke="rgba(201,162,39,0.16)" stroke-width="1"/>
    <!-- 12 month divisions -->
    <g stroke="#c9a227" stroke-width="1.4" opacity="0.55">
      <line x1="0" y1="-300" x2="0" y2="-252"/>
      <line transform="rotate(30)"  x1="0" y1="-300" x2="0" y2="-252"/>
      <line transform="rotate(60)"  x1="0" y1="-300" x2="0" y2="-252"/>
      <line transform="rotate(90)"  x1="0" y1="-300" x2="0" y2="-252"/>
      <line transform="rotate(120)" x1="0" y1="-300" x2="0" y2="-252"/>
      <line transform="rotate(150)" x1="0" y1="-300" x2="0" y2="-252"/>
      <line transform="rotate(180)" x1="0" y1="-300" x2="0" y2="-252"/>
      <line transform="rotate(210)" x1="0" y1="-300" x2="0" y2="-252"/>
      <line transform="rotate(240)" x1="0" y1="-300" x2="0" y2="-252"/>
      <line transform="rotate(270)" x1="0" y1="-300" x2="0" y2="-252"/>
      <line transform="rotate(300)" x1="0" y1="-300" x2="0" y2="-252"/>
      <line transform="rotate(330)" x1="0" y1="-300" x2="0" y2="-252"/>
    </g>
    <!-- highlighted "now → ahead" arc (first ~4 months) -->
    <path d="M 0 -300 A 300 300 0 0 1 259.8 -150" fill="none" stroke="url(#ya-gold)" stroke-width="4" opacity="0.92"/>
    <!-- transit markers riding the ring -->
    <circle cx="0" cy="-300" r="8" fill="#fff6dd"/>
    <circle cx="150" cy="-259.8" r="7" fill="#e6c24a"/>
    <circle cx="259.8" cy="-150" r="6" fill="#caa46a"/>
    <circle cx="-212" cy="-212" r="5.5" fill="#b9c4cf"/>
    <circle cx="-290" cy="78" r="5" fill="#d8d2cc"/>
    <!-- inner dashed orbit + core -->
    <circle r="120" fill="none" stroke="rgba(201,162,39,0.18)" stroke-width="0.8" stroke-dasharray="3 7"/>
    <circle r="190" fill="url(#ya-core)"/>
    <circle r="16" fill="#fff6dd"/>
  </g>

  <!-- scrim + title -->
  <rect y="470" width="1600" height="430" fill="url(#ya-scrim)"/>
  <g text-anchor="middle" font-family="'Cormorant Garamond', 'Cinzel', Georgia, 'Times New Roman', serif">
    <text x="800" y="648" font-size="32" letter-spacing="13" fill="#e6c24a" opacity="0.85" font-family="'Cinzel', Georgia, serif">&#10022; &#160; TWELVE MONTHS OF TRANSITS</text>
    <text x="800" y="758" font-size="120" font-weight="600" fill="url(#ya-gold)" letter-spacing="2">Your Year Ahead</text>
    <text x="800" y="816" font-size="38" font-style="italic" fill="#f0e9da" opacity="0.86">Every major transit to your chart — dated &amp; interpreted</text>
    <text x="800" y="866" font-size="21" letter-spacing="8" fill="#a6aeb8" opacity="0.8" font-family="'Cinzel', Georgia, serif">REAL VSOP87 &#183; YOUR SKY, NOT A GENERIC FORECAST</text>
  </g>

  <rect x="22" y="22" width="1556" height="856" fill="none" stroke="rgba(201,162,39,0.28)" stroke-width="1.5"/>
  <rect x="34" y="34" width="1532" height="832" fill="none" stroke="rgba(201,162,39,0.12)" stroke-width="1"/>
</svg>
