<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="The Complete Set — your deep reading and your natal sky poster, together">
  <defs>
    <radialGradient id="bn-void" cx="50%" cy="40%" r="84%">
      <stop offset="0%" stop-color="#0d0a09"/><stop offset="50%" stop-color="#070509"/><stop offset="100%" stop-color="#040305"/>
    </radialGradient>
    <radialGradient id="bn-join" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6dd"/><stop offset="26%" stop-color="#e6c24a"/><stop offset="62%" stop-color="rgba(201,162,39,0.22)"/><stop offset="100%" stop-color="rgba(201,162,39,0)"/>
    </radialGradient>
    <linearGradient id="bn-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3dd97"/><stop offset="52%" stop-color="#e6c24a"/><stop offset="100%" stop-color="#b8901f"/>
    </linearGradient>
    <linearGradient id="bn-page" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8901f"/><stop offset="50%" stop-color="#f3dd97"/><stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
    <linearGradient id="bn-silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8d2cc"/><stop offset="55%" stop-color="#b9c4cf"/><stop offset="100%" stop-color="#a6aeb8"/>
    </linearGradient>
    <linearGradient id="bn-scrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(4,3,5,0)"/><stop offset="68%" stop-color="rgba(4,3,5,0.54)"/><stop offset="100%" stop-color="rgba(4,3,5,0.92)"/>
    </linearGradient>
    <filter id="bn-soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="2.4"/></filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bn-void)"/>

  <!-- starfield -->
  <g fill="#f0e9da">
    <circle cx="120" cy="90" r="1.5" opacity="0.6"/><circle cx="340" cy="60" r="1.1" opacity="0.5"/><circle cx="560" cy="110" r="1.3" opacity="0.55"/><circle cx="800" cy="58" r="1.6" opacity="0.7"/><circle cx="1040" cy="100" r="1.2" opacity="0.5"/><circle cx="1280" cy="64" r="1.5" opacity="0.65"/><circle cx="1470" cy="140" r="1.3" opacity="0.6"/><circle cx="1530" cy="320" r="1.5" opacity="0.65"/><circle cx="90" cy="300" r="1.4" opacity="0.6"/><circle cx="70" cy="480" r="1.5" opacity="0.6"/><circle cx="1505" cy="500" r="1.2" opacity="0.5"/><circle cx="1420" cy="240" r="1.1" opacity="0.45"/><circle cx="230" cy="200" r="1.2" opacity="0.5"/><circle cx="1180" cy="210" r="1.1" opacity="0.5"/>
  </g>
  <g fill="#a6aeb8">
    <circle cx="450" cy="210" r="1.1" opacity="0.5"/><circle cx="980" cy="170" r="1" opacity="0.45"/><circle cx="1340" cy="400" r="1.1" opacity="0.5"/><circle cx="200" cy="420" r="1.2" opacity="0.5"/><circle cx="700" cy="280" r="1" opacity="0.4"/>
  </g>

  <!-- connecting glow -->
  <circle cx="800" cy="380" r="300" fill="url(#bn-join)" opacity="0.9"/>

  <!-- RIGHT: framed natal poster (behind) -->
  <g transform="translate(960 360)">
    <rect x="-188" y="-238" width="376" height="496" rx="6" fill="#070509" stroke="url(#bn-gold)" stroke-width="3"/>
    <rect x="-176" y="-226" width="352" height="472" rx="4" fill="none" stroke="rgba(201,162,39,0.30)" stroke-width="1.2"/>
    <g transform="translate(0 -36)">
      <circle r="150" fill="none" stroke="url(#bn-silver)" stroke-width="1.8" opacity="0.85"/>
      <circle r="140" fill="none" stroke="rgba(166,174,184,0.32)" stroke-width="1"/>
      <circle r="100" fill="none" stroke="rgba(201,162,39,0.30)" stroke-width="1.2"/>
      <circle r="68" fill="none" stroke="rgba(201,162,39,0.16)" stroke-width="1" stroke-dasharray="3 7"/>
      <g stroke="#c9a227" stroke-width="1" opacity="0.5">
        <line x1="0" y1="-150" x2="0" y2="-100"/><line transform="rotate(30)" x1="0" y1="-150" x2="0" y2="-100"/><line transform="rotate(60)" x1="0" y1="-150" x2="0" y2="-100"/><line transform="rotate(90)" x1="0" y1="-150" x2="0" y2="-100"/><line transform="rotate(120)" x1="0" y1="-150" x2="0" y2="-100"/><line transform="rotate(150)" x1="0" y1="-150" x2="0" y2="-100"/><line transform="rotate(180)" x1="0" y1="-150" x2="0" y2="-100"/><line transform="rotate(210)" x1="0" y1="-150" x2="0" y2="-100"/><line transform="rotate(240)" x1="0" y1="-150" x2="0" y2="-100"/><line transform="rotate(270)" x1="0" y1="-150" x2="0" y2="-100"/><line transform="rotate(300)" x1="0" y1="-150" x2="0" y2="-100"/><line transform="rotate(330)" x1="0" y1="-150" x2="0" y2="-100"/>
      </g>
      <g stroke="#c9a227" stroke-width="0.9" fill="none" opacity="0.38">
        <line x1="31.7" y1="-118.3" x2="-51.8" y2="111.0"/><line x1="115.1" y1="-41.9" x2="-86.6" y2="86.6"/><line x1="93.9" y1="78.8" x2="-86.6" y2="-86.6"/>
      </g>
      <g>
        <circle cx="31.7" cy="-118.3" r="6" fill="#e6c24a" stroke="#f3dd97" stroke-width="1"/><circle cx="115.1" cy="-41.9" r="5" fill="#d8d2cc"/><circle cx="93.9" cy="78.8" r="4.5" fill="#caa46a"/><circle cx="-51.8" cy="111.0" r="5" fill="#b8901f" stroke="#c9a227" stroke-width="1"/><circle cx="-86.6" cy="-86.6" r="5" fill="#f3dd97"/>
      </g>
      <circle r="58" fill="url(#bn-join)" opacity="0.8"/>
      <polygon points="0,-30 6,-6 30,0 6,6 0,30 -6,6 -30,0 -6,-6" fill="url(#bn-gold)"/>
      <circle r="3" fill="#fff6dd"/>
    </g>
    <line x1="-120" y1="178" x2="120" y2="178" stroke="rgba(201,162,39,0.45)" stroke-width="1"/>
