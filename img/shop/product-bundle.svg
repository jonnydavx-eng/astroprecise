    <ellipse cx="0" cy="176" rx="278" ry="34" fill="#040305" opacity="0.55" filter="url(#bn-soft)"/>
    <line x1="0" y1="-150" x2="0" y2="158" stroke="#f3dd97" stroke-width="2.5" opacity="0.7"/>
    <path d="M0,-148 C-92,-176 -196,-168 -262,-140 L-262,128 C-196,156 -92,164 0,142 Z" fill="url(#bn-page)" opacity="0.96" stroke="#b8901f" stroke-width="1.5"/>
    <path d="M0,-148 C92,-176 196,-168 262,-140 L262,128 C196,156 92,164 0,142 Z" fill="url(#bn-page)" opacity="0.96" stroke="#b8901f" stroke-width="1.5"/>
    <path d="M0,-148 C-44,-160 -92,-160 -130,-152 L-130,140 C-92,148 -44,148 0,142 Z" fill="#070509" opacity="0.10"/>
    <path d="M0,-148 C44,-160 92,-160 130,-152 L130,140 C92,148 44,148 0,142 Z" fill="#070509" opacity="0.10"/>
    <g stroke="#070509" stroke-width="3" opacity="0.32" stroke-linecap="round">
      <line x1="-220" y1="-104" x2="-44" y2="-118"/><line x1="-220" y1="-74" x2="-40" y2="-88"/><line x1="-220" y1="-44" x2="-48" y2="-58"/><line x1="-220" y1="-14" x2="-40" y2="-28"/><line x1="-220" y1="16" x2="-50" y2="2"/><line x1="-220" y1="46" x2="-42" y2="32"/><line x1="-220" y1="76" x2="-58" y2="62"/><line x1="-220" y1="106" x2="-46" y2="94"/>
    </g>
    <g stroke="#070509" stroke-width="3" opacity="0.32" stroke-linecap="round">
      <line x1="44" y1="-118" x2="220" y2="-104"/><line x1="40" y1="-88" x2="220" y2="-74"/><line x1="48" y1="-58" x2="220" y2="-44"/><line x1="40" y1="-28" x2="220" y2="-14"/><line x1="50" y1="2" x2="220" y2="16"/><line x1="42" y1="32" x2="220" y2="46"/><line x1="58" y1="62" x2="220" y2="76"/><line x1="46" y1="94" x2="220" y2="106"/>
    </g>
    <polygon transform="translate(132 -132)" points="0,-16 4,-4 16,0 4,4 0,16 -4,4 -16,0 -4,-4" fill="#070509" opacity="0.4"/>
    <path d="M-262,-140 C-196,-168 -92,-176 0,-148 C92,-176 196,-168 262,-140" fill="none" stroke="#f3dd97" stroke-width="1.4" opacity="0.65"/>
  </g>

  <!-- union + mark -->
  <g transform="translate(800 372)" opacity="0.55" filter="url(#bn-soft)">
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#f3dd97" stroke-width="3"/>
    <line x1="0" y1="-22" x2="0" y2="22" stroke="#f3dd97" stroke-width="3"/>
  </g>

  <!-- scrim + title -->
  <rect y="470" width="1600" height="430" fill="url(#bn-scrim)"/>
  <g text-anchor="middle" font-family="'Cinzel','Cormorant Garamond',Georgia,'Times New Roman',serif">
    <text x="800" y="648" font-size="32" letter-spacing="13" fill="#e6c24a" opacity="0.85" font-family="'Cinzel',Georgia,serif">&#10022; &#160; BEST VALUE BUNDLE</text>
    <text x="800" y="758" font-size="118" font-weight="600" fill="url(#bn-gold)" letter-spacing="2">Reading &amp; Poster</text>
    <text x="800" y="816" font-size="40" font-style="italic" fill="#f0e9da" opacity="0.86">Your story and your sky, together</text>
    <text x="800" y="866" font-size="21" letter-spacing="8" fill="#a6aeb8" opacity="0.8" font-family="'Cinzel',Georgia,serif">INSTANT PDF + 250GSM PRINT</text>
  </g>

  <rect x="22" y="22" width="1556" height="856" fill="none" stroke="rgba(201,162,39,0.28)" stroke-width="1.5"/>
  <rect x="34" y="34" width="1532" height="832" fill="none" stroke="rgba(201,162,39,0.12)" stroke-width="1"/>
</svg>
