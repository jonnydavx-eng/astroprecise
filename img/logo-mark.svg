<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Astro Precise instrument mark">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4E6B8"/>
      <stop offset="0.45" stop-color="#C2A05E"/>
      <stop offset="1" stop-color="#7A5A22"/>
    </linearGradient>
    <linearGradient id="etch" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#1a1510" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#1a1510" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#1a1510" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="44%" r="58%">
      <stop offset="0" stop-color="#C2A05E" stop-opacity="0.42"/>
      <stop offset="0.55" stop-color="#8C6A2F" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#C2A05E" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Hex instrument plate -->
  <path d="M32 3 L57 17.5 L57 46.5 L32 61 L7 46.5 L7 17.5 Z" fill="none" stroke="url(#lg)" stroke-width="1.35" opacity="0.9"/>
  <path d="M32 8 L52 20 L52 44 L32 56 L12 44 L12 20 Z" fill="none" stroke="#C2A05E" stroke-width="0.55" opacity="0.32"/>

  <!-- Degree ticks -->
  <g stroke="#C2A05E" stroke-width="0.85" opacity="0.62">
    <line x1="32" y1="5" x2="32" y2="9"/><line x1="32" y1="55" x2="32" y2="59"/>
    <line x1="5" y1="32" x2="9" y2="32"/><line x1="55" y1="32" x2="59" y2="32"/>
    <line x1="14.5" y1="14.5" x2="17" y2="17"/><line x1="47" y1="47" x2="49.5" y2="49.5"/>
    <line x1="49.5" y1="14.5" x2="47" y2="17"/><line x1="17" y1="47" x2="14.5" y2="49.5"/>
  </g>

  <!-- Reticle ring -->
  <circle cx="32" cy="32" r="22" fill="url(#halo)" stroke="url(#lg)" stroke-width="0.75" opacity="0.88"/>
  <circle cx="32" cy="32" r="16" fill="none" stroke="#C2A05E" stroke-width="0.45" stroke-dasharray="2.5 5" opacity="0.38"/>
  <line x1="32" y1="10" x2="32" y2="54" stroke="#C2A05E" stroke-width="0.4" opacity="0.28"/>
  <line x1="10" y1="32" x2="54" y2="32" stroke="#C2A05E" stroke-width="0.4" opacity="0.28"/>

  <!-- Engraved cross-star -->
  <g filter="url(#glow)">
    <path d="M32 13 L34.6 28.2 L50 32 L34.6 35.8 L32 51 L29.4 35.8 L14 32 L29.4 28.2 Z" fill="url(#lg)"/>
    <path d="M32 20 L35.2 27.6 L43 32 L35.2 36.4 L32 44 L28.8 36.4 L21 32 L28.8 27.6 Z" fill="#F2DFA7" opacity="0.38" transform="rotate(45 32 32)"/>
  </g>
  <rect x="14" y="31.2" width="36" height="1.6" fill="url(#etch)" opacity="0.55" transform="rotate(-12 32 32)"/>

  <!-- Pivot -->
  <circle cx="32" cy="32" r="2.6" fill="#f0e8d8"/>
  <circle cx="32" cy="32" r="4.8" fill="none" stroke="#C2A05E" stroke-width="0.65" opacity="0.78"/>
</svg>