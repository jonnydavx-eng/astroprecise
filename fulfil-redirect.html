  <script type="application/ld+json">{"@context":"https://schema.org","@type":"WebPage","name":"Redirecting to birth details","description":"Redirecting you to the birth-details form to complete your AstroPrecise order.","url":"https://astroprecise.app/fulfil-redirect.html","isPartOf":{"@type":"WebSite","name":"AstroPrecise","url":"https://astroprecise.app"},"publisher":{"@type":"Organization","name":"AstroPrecise","url":"https://astroprecise.app"}}</script>

<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <main id="main">
    <h1 class="sr-only">Redirecting to birth details</h1>
    <p>Redirecting to your birth-details form…</p>
  </main>
  <script>
    (function () {
      var p = new URLSearchParams(location.search);
      var form = p.get('form');
      if (!form) {
        document.body.innerHTML = '<a class="skip-link" href="#main">Skip to content</a><main id="main"><h1 class="sr-only">Missing form reference</h1><p>Missing form reference. <a href="https://astroprecise.app/shop.html">Return to shop</a></p></main>';
        return;
      }
      var parts = [];
      ['email', 'buyer_name', 'order_id', 'product_sku'].forEach(function (k) {
        var v = p.get(k);
        if (v) parts.push(k + '=' + encodeURIComponent(v));
      });
      var dest = 'https://form.typeform.com/to/' + encodeURIComponent(form);
      if (parts.length) dest += '#' + parts.join('&');
      location.replace(dest);
    })();
  </script>
