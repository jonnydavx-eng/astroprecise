<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="Owner outreach toolkit — copy emails and X posts" />
  <title>Outreach toolkit — Astro Precise</title>
  
  <style>
    /* Critical fonts — block display prevents panel-x reflow when fonts.css defers */
    @font-face{font-family:'Cinzel';font-style:normal;font-weight:600;font-display:block;src:url(fonts/cinzel-normal-600.woff2) format('woff2');}
    @font-face{font-family:'Inter';font-style:normal;font-weight:400;font-display:block;src:url(fonts/inter-normal-400.woff2) format('woff2');}
    @font-face{font-family:'Inter';font-style:normal;font-weight:600;font-display:block;src:url(fonts/inter-normal-600.woff2) format('woff2');}
    /* CLS: panel-x skeleton must reserve before outreach-page.css parses */
    #panel-x.ot-panel.is-on { min-height: 1300px; contain: layout style; }
    .ot-card--skeleton { visibility: hidden; min-height: 210px; margin-bottom: 0.85rem; }
    .ot h1 {
      font-family: 'Cinzel', 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
      min-height: 1.5em;
      line-height: 1.3;
      contain: layout style;
    }
    html.ap-fonts-ready .ot h1 { font-family: Cinzel, serif; }
    .ot-card__title {
      font-family: Inter, system-ui, sans-serif;
      min-height: 1.35em;
      contain: layout style;
    }
    .ot-pre { min-height: 4.5em; contain: layout style; }
    .ot-tabs { min-height: 44px; }
  </style>
  <link rel="preload" href="css/main-lite.css" as="style" />
  <link rel="preload" href="fonts/cinzel-normal-600.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="fonts/inter-normal-400.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="stylesheet" href="css/fonts.css" media="print" onload="this.media='all';document.documentElement.classList.add('ap-fonts-ready');" />
  <noscript><link rel="stylesheet" href="css/fonts.css" /></noscript>
  <link rel="stylesheet" href="css/main-lite.css" />
  <link rel="stylesheet" href="css/ap-page-bridge.css" />
  <link rel="stylesheet" href="css/outreach-page.css" />
  <script src="js/defer-page-css.js" defer></script>
  <script defer>document.addEventListener('DOMContentLoaded',function(){deferMainCss();});</script>
  <script src="js/outreach-content.js" defer></script>
  <script defer>
  document.addEventListener('DOMContentLoaded', function () {
  (function () {
    var O = window.AP_OUTREACH;
    if (!O) return;

    function toast() {
      var t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(function () { t.classList.remove('show'); }, 1400);
    }
    function copy(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(toast);
      } else {
        var ta = document.createElement('textarea');
        ta.value = text; document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); toast(); } catch (e) {}
        document.body.removeChild(ta);
      }
    }
    function btn(label, text) {
      var b = document.createElement('button');
      b.type = 'button'; b.className = 'ot-btn'; b.textContent = label;
      b.addEventListener('click', function () { copy(text); });
      return b;
    }
    function card(title, meta, body, copyText) {
      var d = document.createElement('div');
      d.className = 'ot-card';
      d.innerHTML = '<h2 class="ot-card__title">' + title + '</h2>' + (meta ? '<p class="ot-meta">' + meta + '</p>' : '') + '<pre class="ot-pre"></pre><div class="ot-actions"></div>';
      d.querySelector('.ot-pre').textContent = body;
      var actions = d.querySelector('.ot-actions');
      actions.appendChild(btn('Copy all', copyText || body));
      return d;
    }

    function clearSkeleton(panel) {
      var sk = panel && panel.querySelector('.ot-skeleton');
      if (sk) sk.remove();
    }

    var px = document.getElementById('panel-x');
    var xt = O.xTraffic;
    var pxCards = [];
    pxCards.push(card('Strategy', O.version, xt.summary));
    var ul = document.createElement('ul'); ul.className = 'ot-list';
    xt.algorithm.priorities.forEach(function (p) { var li = document.createElement('li'); li.textContent = p; ul.appendChild(li); });
    var alg = card('Algorithm (2026)', 'First ' + xt.algorithm.velocityWindowMin + ' min velocity', '');
    alg.appendChild(ul);
    pxCards.push(alg);
    pxCards.push(card('Profile bio', xt.profile.handle, xt.profile.bio, xt.profile.bio));
    pxCards.push(card('Pinned post', '', xt.profile.pinnedPost, xt.profile.pinnedPost));
    pxCards.push(card('Cadence', '', 'Posts: ' + xt.cadence.originalPostsPerDay + '/day · Replies: ' + xt.cadence.repliesPerDay + '/day · Times (UK): ' + xt.cadence.bestTimesUk.join(', ')));
    var eng = card('Accounts to engage', '', '');
    var el = document.createElement('ul'); el.className = 'ot-list';
    xt.accountsToEngage.forEach(function (a) {
      var li = document.createElement('li'); li.textContent = a.handle + ' — ' + a.why; el.appendChild(li);
    });
    eng.appendChild(el);
    pxCards.push(eng);
    px.replaceChildren.apply(px, pxCards);

    var pe = document.getElementById('panel-emails');
    clearSkeleton(pe);
    O.exportAllEmails().forEach(function (e) {
      var meta = [e.section, e.delay, e.tag].filter(Boolean).join(' · ');
      var full = 'SUBJECT: ' + e.subject + '\n\n' + e.body;
      pe.appendChild(card(e.id, meta, full, full));
    });

    var pp = document.getElementById('panel-posts');
    clearSkeleton(pp);
    O.xPosts.singles.forEach(function (p) {
      var text = O.format(p.text);
      pp.appendChild(card(p.id, 'Day ' + p.day, text, text));
    });
    O.xPosts.threads.forEach(function (th) {
      var joined = th.posts.map(function (t, i) { return (i + 1) + '/' + th.posts.length + '\n' + O.format(t); }).join('\n\n');
      pp.appendChild(card(th.id, th.title, joined, joined));
    });

    var pr = document.getElementById('panel-replies');
    clearSkeleton(pr);
    O.xPosts.replyTemplates.forEach(function (r) {
      pr.appendChild(card(r.id, '', r.template, r.template));
    });

    function activateTab(tab) {
      document.querySelectorAll('.ot-tab').forEach(function (t) {
        var on = t === tab;
        t.classList.toggle('is-on', on);
        t.setAttribute('aria-selected', on ? 'true' : 'false');
        t.tabIndex = on ? 0 : -1;
      });
      document.querySelectorAll('.ot-panel').forEach(function (p) {
        var on = p.id === 'panel-' + tab.dataset.tab;
        p.classList.toggle('is-on', on);
        if (on) p.removeAttribute('hidden');
        else p.setAttribute('hidden', '');
      });
    }

    document.querySelectorAll('.ot-tab').forEach(function (tab) {
      tab.addEventListener('click', function () { activateTab(tab); });
      tab.addEventListener('keydown', function (e) {
        var tabs = Array.prototype.slice.call(document.querySelectorAll('.ot-tab'));
        var idx = tabs.indexOf(tab);
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
          e.preventDefault();
          activateTab(tabs[(idx + 1) % tabs.length]);
          tabs[(idx + 1) % tabs.length].focus();
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
          e.preventDefault();
          activateTab(tabs[(idx - 1 + tabs.length) % tabs.length]);
          tabs[(idx - 1 + tabs.length) % tabs.length].focus();
        }
      });
    });
  })();
  });
  </script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <main id="main" class="ot">
    <h1>Outreach toolkit</h1>
    <p class="ot__sub">Owner copy deck — emails + X posts from <code>js/outreach-content.js</code>. Not indexed.</p>

    <div class="ot-tabs" role="tablist" aria-label="Outreach content sections">
      <button type="button" class="ot-tab is-on" role="tab" id="tab-x" aria-selected="true" aria-controls="panel-x" data-tab="x">X playbook</button>
      <button type="button" class="ot-tab" role="tab" id="tab-emails" aria-selected="false" aria-controls="panel-emails" data-tab="emails">Emails</button>
      <button type="button" class="ot-tab" role="tab" id="tab-posts" aria-selected="false" aria-controls="panel-posts" data-tab="posts">X posts</button>
      <button type="button" class="ot-tab" role="tab" id="tab-replies" aria-selected="false" aria-controls="panel-replies" data-tab="replies">Reply templates</button>
    </div>

    <div id="panel-x" class="ot-panel is-on" role="tabpanel" aria-labelledby="tab-x">
      <div class="ot-skeleton" aria-hidden="true">
        <div class="ot-card ot-card--skeleton"></div>
        <div class="ot-card ot-card--skeleton"></div>
        <div class="ot-card ot-card--skeleton"></div>
        <div class="ot-card ot-card--skeleton"></div>
        <div class="ot-card ot-card--skeleton"></div>
        <div class="ot-card ot-card--skeleton"></div>
      </div>
    </div>
    <div id="panel-emails" class="ot-panel" role="tabpanel" aria-labelledby="tab-emails" hidden>
      <div class="ot-skeleton" aria-hidden="true"><div class="ot-card ot-card--skeleton"></div></div>
    </div>
    <div id="panel-posts" class="ot-panel" role="tabpanel" aria-labelledby="tab-posts" hidden>
      <div class="ot-skeleton" aria-hidden="true"><div class="ot-card ot-card--skeleton"></div></div>
    </div>
    <div id="panel-replies" class="ot-panel" role="tabpanel" aria-labelledby="tab-replies" hidden>
      <div class="ot-skeleton" aria-hidden="true"><div class="ot-card ot-card--skeleton"></div></div>
    </div>

    <p class="ot-foot">
      CLI export: <code>node tools/export-outreach.mjs</code> ·
      <a href="links.html">links.html</a> ·
      <a href="index.html">Home</a>
    </p>
  </main>
  <div class="ot-toast" id="toast" aria-live="polite">Copied</div>

  <script src="js/ap-page-boot.js" defer></script>
</body>
</html>
