name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths: [website/**]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pages is configured to serve the gh-pages branch from its root,
      # so publish website/ there instead of using actions/deploy-pages.
      - name: Publish website/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website
          exclude_assets: 'tools'
