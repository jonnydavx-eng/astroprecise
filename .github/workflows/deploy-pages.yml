name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths: [website/**, .github/workflows/deploy-pages.yml, tools/ping-indexnow.mjs, test-engine.mjs, test-horoscope.mjs, test-compat.mjs, test-art-themes.mjs, tools/e2e-profile-save-audit.mjs]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ephemeris engine regression
        run: node test-engine.mjs

      - name: Horoscope determinism
        run: node test-horoscope.mjs

      - name: Synastry compatibility
        run: node test-compat.mjs

      - name: Art theme library
        run: node test-art-themes.mjs

      - name: Profile save e2e audit
        run: |
          node website/tools/serve-preview.mjs 8790 &
          sleep 2
          node tools/e2e-profile-save-audit.mjs

      - name: Production Lighthouse CI
        env:
          LH_CI_A11Y_MIN: 90
        run: |
          node website/tools/serve-preview.mjs 8790 &
          sleep 2
          npm ci
          npm run lighthouse:production:ci
        working-directory: tools/visual-check

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pages is configured to serve the gh-pages branch from its root,
      # so publish website/ there instead of using actions/deploy-pages.
      - name: Publish website/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website
          # Match tools/build.mjs SKIP_* exclusions so the Actions deploy and the
          # manual `build.mjs --raw` deploy publish an identical tree (no internal
          # phone tools / dev docs leak to production).
          exclude_assets: 'tools,phone-audit.html,phone-cosmic-viewer.html,CREDITS.md'

      - name: Notify search engines (IndexNow)
        if: success()
        run: |
          sleep 45
          node tools/ping-indexnow.mjs