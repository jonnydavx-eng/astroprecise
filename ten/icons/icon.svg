<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="112" fill="#0d0a07"/>
  <!-- a clock-face ring with a deliberate gap: ten minutes, a held breath -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#c9a227" stroke-width="14"
          stroke-linecap="round" stroke-dasharray="800 142" transform="rotate(-90 256 256)"/>
  <!-- the two hands at 'ten' -->
  <line x1="256" y1="256" x2="256" y2="150" stroke="#efe3c0" stroke-width="14" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="178" y2="300" stroke="#efe3c0" stroke-width="14" stroke-linecap="round"/>
  <circle cx="256" cy="256" r="13" fill="#efe3c0"/>
</svg>
